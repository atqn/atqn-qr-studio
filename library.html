<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مكتبة الكتب - ATQN QR Studio</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

<header class="topbar">

    <div class="brand">

        <img src="assets/atqn-logo.png" alt="ATQN">

        <h1>ATQN QR Studio</h1>

    </div>

    <nav>

        <a href="index.html">الرئيسة</a>

        <a href="create.html">إنشاء QR</a>

        <a href="library.html" class="active">مكتبة الكتب</a>

    </nav>

</header>

<div class="container">

    <div class="library-header">

        <h2>مكتبة الكتب</h2>

        <p>
            إدارة كتب الإملاء والباركودات التعليمية
        </p>

    </div>

    <div class="books-grid">

        <div class="book-card">

            <div class="book-icon">📘</div>

            <h3>كتاب المدود</h3>

            <div class="book-count">
                24 QR
            </div>

            <button class="book-btn">
                فتح الكتاب
            </button>

        </div>

        <div class="book-card">

            <div class="book-icon">📗</div>

            <h3>كتاب الهمزات</h3>

            <div class="book-count">
                18 QR
            </div>

            <button class="book-btn">
                فتح الكتاب
            </button>

        </div>

        <div class="book-card">

            <div class="book-icon">📙</div>

            <h3>كتاب التنوين</h3>

            <div class="book-count">
                35 QR
            </div>

            <button class="book-btn">
                فتح الكتاب
            </button>

        </div>

        <div class="add-book-card">

            <div class="add-icon">➕</div>

            <h3>إضافة كتاب جديد</h3>

        </div>

    </div>

</div>

</body>

</html>
