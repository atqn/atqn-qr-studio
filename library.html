<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الكتب - ATQN QR Studio</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

<header class="topbar">

    <div class="brand">
        <img src="assets/atqn-logo.png" alt="ATQN">
        <h1>ATQN QR Studio</h1>
    </div>

    <nav>
        <a href="index.html">الرئيسة</a>
        <a href="library.html" class="active">الكتب</a>
        <a href="create.html">إنشاء QR</a>
        <a href="#" onclick="logout()">خروج</a>
    </nav>

</header>

<main class="container">

    <div class="library-header">
        <h2>إدارة الكتب</h2>
    </div>

    <div class="library-toolbar">
        <button id="addBookBtn" class="add-book-btn">➕ إضافة كتاب</button>
    </div>

    <div class="books-scroll">
        <div id="booksGrid" class="books-grid"></div>
    </div>

</main>

<div id="bookModal" class="modal-overlay">
    <div class="modal-box">
        <div class="modal-icon">📘</div>
        <h3 id="bookModalTitle">إضافة كتاب</h3>

        <input id="bookTitleInput" class="modal-input" type="text" placeholder="اسم الكتاب">

        <div class="modal-actions">
            <button id="saveBookBtn" class="modal-btn danger-btn">حفظ</button>
            <button id="cancelBookBtn" class="modal-btn cancel-btn">إلغاء</button>
        </div>
    </div>
</div>

<div id="deleteModal" class="modal-overlay">
    <div class="modal-box">
        <div class="modal-icon">⚠️</div>
        <h3>تأكيد الحذف</h3>
        <p>هل تريد حذف هذا الكتاب؟</p>

        <div class="modal-actions">
            <button id="confirmDeleteBtn" class="modal-btn danger-btn">حذف</button>
            <button id="cancelDeleteBtn" class="modal-btn cancel-btn">إلغاء</button>
        </div>
    </div>
</div>

<script type="module" src="library.js"></script>

</body>
</html>
