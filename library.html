<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>مكتبة الكتب</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
    <h1>📚 مكتبة الكتب</h1>
</header>

<div class="container">

    <button id="addBookBtn">➕ إضافة كتاب</button>

    <div id="booksGrid" class="books-grid"></div>

</div>

<!-- MODAL -->
<div id="modal" class="modal-overlay" style="display:none;">
    <div class="modal-box">

        <h3>إضافة كتاب</h3>

        <input id="bookTitleInput" placeholder="اسم الكتاب">

        <div class="modal-actions">
            <button id="saveBtn">حفظ</button>
            <button id="cancelBtn">إلغاء</button>
        </div>

    </div>
</div>

<script type="module" src="library.js"></script>

<script type="module" src="auth.js"></script>

<script src="header.js"></script>
    
</body>
</html>
