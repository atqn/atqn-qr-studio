<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إنشاء QR - ATQN QR Studio</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

<header class="topbar">

    <div class="brand">
        <img src="assets/atqn-logo.png" alt="ATQN">
        <h1>ATQN QR Studio</h1>
    </div>

    <nav>
        <a href="index.html">الرئيسة</a>
        <a href="create.html">إنشاء QR</a>
        <a href="library.html">مكتبة الكتب</a>
        <a href="#" onclick="logout()">خروج</a>
    </nav>

</header>

<div class="container">

    <div class="create-layout">

        <div class="panel">

            <h3>بيانات الباركود</h3>

            <label>اسم الكتاب</label>
            <input id="bookNameInput" type="text" readonly>

            <label>عنوان الباركود</label>
            <input id="qrTitleInput" type="text">

            <label>وصف مختصر</label>
            <input id="qrDescriptionInput" type="text">

            <label>المحتوى / الرابط</label>
            <input id="qrContentInput" type="text">

        </div>

        <div class="panel">

            <h3>الإعدادات</h3>

            <label>اللون</label>
            <input id="qrColorInput" type="color" value="#38bdf8">

            <label>الستايل</label>
            <select id="qrStyleInput">
                <option value="square">Square</option>
                <option value="dots">Dots</option>
                <option value="rounded">Rounded</option>
                <option value="extra-rounded">Extra Rounded</option>
            </select>

            <label>الدقة</label>
            <select id="qrSizeInput">
                <option value="300">300</option>
                <option value="600" selected>600</option>
                <option value="1200">1200</option>
            </select>

            <label>رفع شعار</label>
            <input type="file" id="qrLogoInput">

        </div>

        <div class="panel preview-panel">

            <h3>المعاينة</h3>

            <div id="qrPreviewBox" class="preview-box"></div>

            <div class="preview-actions">

                <button id="generatePreviewBtn" class="action-btn primary">⚡ توليد</button>
                <button id="saveQrChangesBtn" class="action-btn success">💾 حفظ</button>
                <button id="downloadQrBtn" class="action-btn dark">⬇️ PNG</button>
                <button id="downloadSvgBtn" class="action-btn dark">⬇️ SVG</button>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.6.0/lib/qr-code-styling.js"></script>

</body>
</html>
