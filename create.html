<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إنشاء QR - ATQN QR Studio</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.6.0/lib/qr-code-styling.js"></script>
</head>

<body>

<header class="topbar">

    <div class="brand">
        <img src="assets/atqn-logo.png" alt="ATQN">
        <h1>ATQN QR Studio</h1>
    </div>

    <nav>
        <a href="index.html">الرئيسة</a>
        <a href="library.html">الكتب</a>
        <a href="create.html" class="active">إنشاء QR</a>
        <a href="#" onclick="logout()">خروج</a>
    </nav>

</header>

<main class="container">

    <div class="library-header">
        <h2>إنشاء QR</h2>
        <p id="pageSubtitle">إعداد الباركود وحفظه داخل المكتبة</p>
    </div>

    <div class="create-layout">

        <section class="panel">

            <h3>بيانات الباركود</h3>

            <label>اسم الكتاب</label>
            <select id="bookSelect"></select>

            <label>عنوان الباركود</label>
            <input id="qrTitleInput" type="text" placeholder="عنوان QR">

            <label>وصف مختصر</label>
            <input id="qrDescriptionInput" type="text" placeholder="وصف مختصر">

            <label>المحتوى / الرابط</label>
            <input id="qrContentInput" type="text" placeholder="الرابط أو المحتوى">

            <div class="info-card">
                <div class="info-title">📚 تنظيم الباركودات</div>
                <p>يتم حفظ كل QR داخل الكتاب المحدد ومزامنته مباشرة عبر Firebase.</p>
            </div>

        </section>

        <section class="panel">

            <h3>الإعدادات</h3>

            <div class="logo-options">

                <label class="radio-item">
                    <input type="radio" name="logoMode" value="default" checked>
                    <span>استخدام شعار ATQN</span>
                </label>

                <label class="radio-item">
                    <input type="radio" name="logoMode" value="upload">
                    <span>رفع شعار من الجهاز</span>
                </label>

            </div>

            <label>رفع الشعار داخل QR</label>
            <input type="file" id="qrLogoInput" accept="image/*">

            <div class="settings-divider"></div>

            <label>اللون</label>
            <input id="qrColorInput" type="color" value="#38bdf8">

            <label>الستايل</label>
            <select id="qrStyleInput">
                <option value="square">Square</option>
                <option value="dots">Dots</option>
                <option value="rounded">Rounded</option>
                <option value="extra-rounded">Extra Rounded</option>
                <option value="classy">Classy</option>
                <option value="classy-rounded">Classy Rounded</option>
            </select>

            <label>الدقة</label>
            <select id="qrSizeInput">
                <option value="300">300</option>
                <option value="600" selected>600</option>
                <option value="1200">1200</option>
                <option value="2400">2400</option>
            </select>

        </section>

        <section class="panel preview-panel">

            <h3>المعاينة</h3>

            <div id="qrPreviewBox" class="preview-box">
                اضغط توليد المعاينة
            </div>

            <div class="preview-actions vertical-actions">

                <button id="generatePreviewBtn" class="action-btn primary">
                    ⚡ توليد المعاينة
                </button>

                <button id="saveQrChangesBtn" class="action-btn success">
                    📚 حفظ في المكتبة
                </button>

                <button id="downloadQrBtn" class="action-btn dark">
                    ⬇️ تحميل PNG
                </button>

                <button id="downloadSvgBtn" class="action-btn dark">
                    ⬇️ تحميل SVG
                </button>

                <a href="library.html" class="action-btn dark clean-link">
                    ← عودة للمكتبة
                </a>

            </div>

        </section>

    </div>

</main>

<div id="toast"></div>

<script type="module" src="create.js"></script>

</body>
</html>
