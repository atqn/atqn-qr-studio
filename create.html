<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>إنشاء QR - ATQN</title>
<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
</head>

<body>

<header class="topbar">
  <div class="brand">
    <img src="assets/atqn-logo.png">
    <h1>ATQN QR Studio</h1>
  </div>

  <nav>
    <a href="index.html">الرئيسية</a>
    <a href="library.html">المكتبة</a>
    <a href="create.html">إنشاء QR</a>
    <a href="#" onclick="logout()">خروج</a>
  </nav>
</header>

<div class="create-layout">

  <!-- LEFT: PREVIEW -->
  <div class="panel preview-panel">
    <h3>المعاينة</h3>

    <div class="qr-preview-box">
      <canvas id="qrCanvas"></canvas>
    </div>

    <button id="generateQR">⚡ توليد QR</button>
    <button id="saveQR">💾 حفظ داخل المكتبة</button>
    <button id="downloadPNG">⬇ PNG</button>
    <button id="downloadSVG">⬇ SVG</button>
  </div>

  <!-- CENTER: SETTINGS -->
  <div class="panel settings-panel">

    <h3>الإعدادات</h3>

    <input id="qrLink" placeholder="الرابط">
    <input id="qrColor" type="color" value="#000000">

    <select id="qrSize">
      <option value="300">300</option>
      <option value="600">600</option>
      <option value="1200">1200</option>
      <option value="2400">2400</option>
    </select>

    <select id="logoMode">
      <option value="default">شعار ATQN</option>
      <option value="upload">رفع شعار</option>
    </select>

    <input type="file" id="logoUpload">

  </div>

  <!-- RIGHT: BOOK DATA -->
  <div class="panel data-panel">

    <h3>بيانات الباركود</h3>

    <select id="bookSelect"></select>

    <input id="qrTitle" placeholder="اسم الباركود">
    <input id="qrDesc" placeholder="وصف مختصر">

    <div class="hint">
      تنظيم الباركود داخل الكتب
    </div>

  </div>

</div>

<script type="module" src="./create.js"></script>

<script type="module">
import { auth } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

onAuthStateChanged(auth, (user) => {
  if (!user) location.href = "login.html";
});
</script>

<script type="module">
import { logout } from "./auth.js";
window.logout = logout;
</script>

</body>
</html>
