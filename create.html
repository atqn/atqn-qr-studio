<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء QR - ATQN QR Studio</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

<header class="topbar">

    <div class="brand">

        <img src="assets/atqn-logo.png" alt="ATQN">

        <div>
            <h1>ATQN QR Studio</h1>
        </div>

    </div>

    <nav>

        <a href="index.html">الرئيسة</a>

        <a href="create.html" class="active">
            إنشاء QR
        </a>

        <a href="library.html">
            مكتبة الكتب
        </a>

    </nav>

</header>

<div class="container">



<div class="create-layout">

    <!-- العمود الأول -->

    <div class="panel">

        <h3>بيانات الباركود</h3>

        <label>اسم الكتاب</label>
        <input type="text">

        <label>عنوان الباركود</label>
        <input type="text">

        <label>وصف مختصر</label>
        <input type="text">

        <label>الرابط</label>
        <input type="text">
<div class="info-card">

<div class="info-title">
    📚 تنظيم الباركودات
</div>

    <p>
        استخدم اسم الكتاب لتجميع جميع أكواد QR الخاصة به
        داخل مكتبة واحدة، ثم أضف عنوانًا واضحًا لكل باركود
        ليسهل العثور عليه لاحقًا.
    </p>

</div>
    </div>

    <!-- العمود الثاني -->

    <div class="panel">

        <h3>الإعدادات</h3>

<div class="logo-options">

    <label class="radio-item">
        <input type="radio" name="logoMode" checked>
        <span>استخدام شعار ATQN</span>
    </label>

    <label class="radio-item">
        <input type="radio" name="logoMode">
        <span>رفع شعار من الجهاز</span>
    </label>

</div>

        <input type="file">

        <label>اللون</label>
        <input type="color" value="#38bdf8">

        <label>الستايل</label>
        <select>
            <option>Square</option>
            <option>Dots</option>
            <option>Rounded</option>
            <option>Extra Rounded</option>
            <option>Classy</option>
            <option>Classy Rounded</option>
        </select>

        <label>الدقة</label>
        <select>
            <option>300</option>
            <option selected>600</option>
            <option>1200</option>
            <option>2400</option>
        </select>

        <button class="secondary-btn">
            💾 حفظ كإعدادات افتراضية
        </button>

    </div>

    <!-- العمود الثالث -->

   <div class="panel preview-panel">

        <h3>المعاينة</h3>

        <div class="preview-box">
            QR Preview
        </div>

     <div class="preview-actions">

    <button class="primary-btn">
        ⚡ توليد المعاينة
    </button>

    <button class="save-btn">
        📚 حفظ في المكتبة
    </button>

    <button class="export-btn">PNG</button>

    <button class="export-btn">SVG</button>

    <button class="export-btn">PDF</button>

</div>

    </div>

</div>

</html>
