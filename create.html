<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء QR - ATQN QR Studio</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

<header class="topbar">

    <div class="brand">

        <img src="assets/atqn-logo.png" alt="ATQN">

        <div>
            <h1>ATQN QR Studio</h1>
        </div>

    </div>

    <nav>

        <a href="index.html">الرئيسية</a>

        <a href="create.html" class="active">
            إنشاء QR
        </a>

        <a href="library.html">
            مكتبة الكتب
        </a>

    </nav>

</header>

<div class="container">

    <div class="page-title">

        <h2>إنشاء QR جديد</h2>

        <p>
            أنشئ الباركود وراجعه قبل حفظه في المكتبة
        </p>

    </div>

<div class="create-layout">

    <!-- العمود الأول -->

    <div class="panel">

        <h3>بيانات الباركود</h3>

        <label>اسم الكتاب</label>
        <input type="text">

        <label>عنوان الباركود</label>
        <input type="text">

        <label>وصف مختصر</label>
        <input type="text">

        <label>الرابط</label>
        <input type="text">

    </div>

    <!-- العمود الثاني -->

    <div class="panel">

        <h3>الإعدادات</h3>

        <label>
            <input type="radio" checked>
            استخدام شعار ATQN
        </label>

        <label>
            <input type="radio">
            رفع شعار
        </label>

        <input type="file">

        <label>اللون</label>
        <input type="color" value="#38bdf8">

        <label>الستايل</label>
        <select>
            <option>Square</option>
            <option>Dots</option>
            <option>Rounded</option>
            <option>Extra Rounded</option>
            <option>Classy</option>
            <option>Classy Rounded</option>
        </select>

        <label>الدقة</label>
        <select>
            <option>300</option>
            <option selected>600</option>
            <option>1200</option>
            <option>2400</option>
        </select>

        <button class="secondary-btn">
            💾 حفظ كإعدادات افتراضية
        </button>

    </div>

    <!-- العمود الثالث -->

    <div class="panel">

        <h3>المعاينة</h3>

        <div class="preview-box">
            QR Preview
        </div>

        <button class="primary-btn">
            ⚡ توليد المعاينة
        </button>

        <button class="save-btn">
            📚 حفظ في المكتبة
        </button>

        <button class="export-btn">
            PNG
        </button>

        <button class="export-btn">
            SVG
        </button>

        <button class="export-btn">
            PDF
        </button>

    </div>

</div>

</html>
