<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<body>

    <div class="brand">

        <img src="assets/atqn-logo.png" alt="ATQN">

        <div>

        </div>

    </div>

    <nav>

        <a href="index.html">الرئيسية</a>

        <a href="create.html" class="active">
            إنشاء QR

        <a href="library.html">
            مكتبة الكتب

    </nav>

<div class="container">

        <p>

    </div>

    <!-- العمود الثاني -->

    <div class="panel">

        <h3>الإعدادات</h3>

        <label>
            <input type="radio" checked>
            استخدام شعار ATQN
        </label>

        <label>
            <input type="radio">
            رفع شعار
        </label>


    </div>
