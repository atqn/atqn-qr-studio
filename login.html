<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">

<!-- 🔥 مهم جدًا لحل مشكلة صغر الشاشة على الجوال -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تسجيل الدخول</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-box">

    <h2>تسجيل الدخول</h2>

    <input id="email" placeholder="البريد">
    <input id="password" type="password" placeholder="كلمة المرور">

    <button id="loginBtn">دخول</button>
    <button id="resetBtn">نسيت كلمة المرور</button>

</div>

<script type="module">

/* ======================
   STATE (منع السبام)
====================== */
let resetCooldown = false;

/* ======================
   TOAST
====================== */
function showToast(msg, targetId = null, type = "info") {

    const div = document.createElement("div");

    div.innerText = msg;

    div.style.cssText = `
        background:${type === "error" ? "#ef4444" : "#1e293b"};
        color:white;
        padding:10px 12px;
        border-radius:8px;
        margin-top:10px;
        font-size:14px;
        width:100%;
        text-align:center;
        font-family:Cairo, sans-serif;
    `;

    if (targetId) {
        const target = document.getElementById(targetId);
        if (target) {
            target.insertAdjacentElement("afterend", div);
        } else {
            document.body.appendChild(div);
        }
    } else {
        document.body.appendChild(div);
    }

    setTimeout(() => div.remove(), 3000);
}

/* ======================
   FIREBASE
====================== */
import { auth } from "./firebase.js";
import {
  signInWithEmailAndPassword,
  sendPasswordResetEmail,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

/* ======================
   AUTO REDIRECT IF LOGGED
====================== */
onAuthStateChanged(auth, (user) => {
    if (user) {
        window.location.href = "index.html";
    }
});

/* ======================
   LOGIN
====================== */
document.getElementById("loginBtn").onclick = async () => {

    const email = document.getElementById("email").value;
    const pass = document.getElementById("password").value;

    try {
        await signInWithEmailAndPassword(auth, email, pass);
        window.location.href = "index.html";
    } catch (error) {
        console.log(error);
        showToast("خطأ في تسجيل الدخول", "loginBtn", "error");
    }
};

/* ======================
   RESET PASSWORD (ANTI-SPAM)
====================== */
document.getElementById("resetBtn").onclick = async () => {

    const email = document.getElementById("email").value;

    if (resetCooldown) return;

    if (!email) {
        showToast("أدخل البريد أولاً", "resetBtn", "error");
        return;
    }

    try {

        resetCooldown = true;

        const btn = document.getElementById("resetBtn");
        btn.disabled = true;
        btn.innerText = "جار الإرسال...";

        await sendPasswordResetEmail(auth, email);

        showToast("تم إرسال رابط الاستعادة", "resetBtn");

        setTimeout(() => {
            resetCooldown = false;
            btn.disabled = false;
            btn.innerText = "نسيت كلمة المرور";
        }, 10000);

    } catch (error) {

        console.log(error);

        resetCooldown = false;

        const btn = document.getElementById("resetBtn");
        btn.disabled = false;
        btn.innerText = "نسيت كلمة المرور";

        showToast("فشل إرسال رابط الاستعادة", "resetBtn", "error");
    }
};

</script>

</body>
</html>
