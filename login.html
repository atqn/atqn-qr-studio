<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>تسجيل الدخول</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-box">

    <h2>تسجيل الدخول</h2>

    <input id="email" placeholder="البريد">
    <input id="password" type="password" placeholder="كلمة المرور">

    <button id="loginBtn">دخول</button>
    <button id="resetBtn">نسيت كلمة المرور</button>

</div>

<script type="module">

/* ======================
   TOAST (محسن + تحت الزر)
====================== */
function showToast(msg, targetId = null, type = "info") {

    const div = document.createElement("div");

    div.innerText = msg;

    div.style.cssText = `
        background:${type === "error" ? "#ef4444" : "#1e293b"};
        color:white;
        padding:10px 12px;
        border-radius:8px;
        margin-top:10px;
        font-size:14px;
        width:100%;
        text-align:center;
        font-family:Cairo, sans-serif;
    `;

    if (targetId) {
        const target = document.getElementById(targetId);
        if (target) {
            target.insertAdjacentElement("afterend", div);
        } else {
            document.body.appendChild(div);
        }
    } else {
        document.body.appendChild(div);
    }

    setTimeout(() => div.remove(), 3000);
}

/* ======================
   FIREBASE
====================== */
import { auth } from "./firebase.js";
import {
  signInWithEmailAndPassword,
  sendPasswordResetEmail,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

/* ======================
   AUTO REDIRECT IF LOGGED
====================== */
onAuthStateChanged(auth, (user) => {
    if (user) {
        window.location.href = "index.html";
    }
});

/* ======================
   LOGIN
====================== */
document.getElementById("loginBtn").onclick = async () => {

    const email = document.getElementById("email").value;
    const pass = document.getElementById("password").value;

    try {
        await signInWithEmailAndPassword(auth, email, pass);
        window.location.href = "index.html";
    } catch (error) {
        console.log(error);
        showToast("خطأ في تسجيل الدخول", null, "error");
    }
};

/* ======================
   RESET PASSWORD
====================== */
document.getElementById("resetBtn").onclick = async () => {

    const email = document.getElementById("email").value;

    if (!email) {
        showToast("أدخل البريد أولاً", "resetBtn", "error");
        return;
    }

    try {
        await sendPasswordResetEmail(auth, email);

        // 🔥 يظهر تحت زر الاستعادة مباشرة
        showToast("تم إرسال رابط الاستعادة إلى بريدك", "resetBtn");

    } catch (error) {

        console.log("RESET ERROR:", error.code, error.message);

        if (error.code === "auth/user-not-found") {
            showToast("هذا البريد غير مسجل", "resetBtn", "error");
        }

        else if (error.code === "auth/invalid-email") {
            showToast("البريد غير صحيح", "resetBtn", "error");
        }

        else if (error.code === "auth/too-many-requests") {
            showToast("محاولات كثيرة، حاول لاحقًا", "resetBtn", "error");
        }

        else {
            showToast("فشل إرسال رابط الاستعادة", "resetBtn", "error");
        }
    }
};

</script>

</body>
</html>
