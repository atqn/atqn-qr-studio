<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>تسجيل الدخول</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-box">

    <h2>تسجيل الدخول</h2>

    <input id="email" placeholder="البريد">
    <input id="password" type="password" placeholder="كلمة المرور">

    <button id="loginBtn">دخول</button>
    <button id="resetBtn">نسيت كلمة المرور</button>

</div>

<script type="module">

/* ======================
   TOAST (إضافة جديدة فقط)
====================== */
function showToast(msg) {
    const div = document.createElement("div");
    div.style.cssText = `
        position:fixed;
        top:20px;
        right:20px;
        background:#1e293b;
        color:white;
        padding:12px 16px;
        border-radius:10px;
        z-index:9999;
        font-family: Cairo, sans-serif;
    `;
    div.innerText = msg;
    document.body.appendChild(div);

    setTimeout(() => div.remove(), 3000);
}

/* ======================
   FIREBASE
====================== */
import { auth } from "./firebase.js";
import {
  signInWithEmailAndPassword,
  sendPasswordResetEmail,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

/* ======================
   AUTO REDIRECT IF LOGGED
====================== */
onAuthStateChanged(auth, (user) => {
    if (user) {
        window.location.href = "index.html";
    }
});

/* ======================
   LOGIN
====================== */
document.getElementById("loginBtn").onclick = async () => {

    const email = document.getElementById("email").value;
    const pass = document.getElementById("password").value;

    try {
        await signInWithEmailAndPassword(auth, email, pass);
        window.location.href = "index.html";
    } catch (error) {
        console.log(error);
        showToast("خطأ في تسجيل الدخول");
    }
};

/* ======================
   RESET PASSWORD
====================== */
document.getElementById("resetBtn").onclick = async () => {

    const email = document.getElementById("email").value;

    if (!email) {
        showToast("أدخل البريد أولاً");
        return;
    }

    try {
        await sendPasswordResetEmail(auth, email);
        showToast("تم إرسال رابط الاستعادة إلى بريدك");
    } catch (error) {

        console.log("RESET ERROR:", error.code, error.message);

        if (error.code === "auth/user-not-found") {
            showToast("هذا البريد غير مسجل");
        }

        else if (error.code === "auth/invalid-email") {
            showToast("البريد غير صحيح");
        }

        else if (error.code === "auth/too-many-requests") {
            showToast("محاولات كثيرة، حاول لاحقًا");
        }

        else {
            showToast("فشل إرسال رابط الاستعادة");
        }
    }
};

</script>

</body>
</html>
