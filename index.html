<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSy...",
  authDomain: "atqn-qr1.firebaseapp.com",
  projectId: "atqn-qr1"
});

const db = getFirestore(app);
const ref = doc(db, "books", "app");

onSnapshot(ref, (snap) => {

    const data = snap.data();
    const books = data?.items || [];

    let qrCount = 0;

    books.forEach(b => qrCount += (b.count || 0));

    document.querySelectorAll(".number")[0].textContent = books.length;
    document.querySelectorAll(".number")[1].textContent = qrCount;

});

</script>
