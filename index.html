<body>

<header class="topbar">

    </div>

    <nav>
        <a href="index.html">الرئيسة</a>

<!-- ================= MAIN ================= -->
<div class="container">

    <div class="hero">

        <div class="logo-box">
            <h1>ATQN QR Studio</h1>

        <div class="card">

<!-- ================= FIREBASE (STABLE COMPAT VERSION) ================= -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBmgkN6Glpa0ly_d4e8heB0TiCmV6ieKbw",
  authDomain: "atqn-qr1.firebaseapp.com",
  projectId: "atqn-qr1",
  storageBucket: "atqn-qr1.firebasestorage.app",
  messagingSenderId: "867770918097",
  appId: "1:867770918097:web:419b4dc7fefe9e1c4d51f0"
};

// INIT
firebase.initializeApp(firebaseConfig);

// DB
const db = firebase.firestore();
window.db = db;

// SAFE WRAPPER (مثل السابق لكن مضمون)
window.firebaseFirestore = {
  doc: firebase.firestore,
  setDoc: (ref, data) => ref.set(data),
  getDoc: (ref) => ref.get(),
  onSnapshot: (ref, cb) => ref.onSnapshot(cb)
};

console.log("🔥 Firebase COMPAT initialized successfully");
</script>

<!-- ================= STATS ================= -->
<script>
document.addEventListener("DOMContentLoaded", function () {

    const books = JSON.parse(localStorage.getItem("atqn_books") || "[]");

    const booksCount = books.length;

    let qrCount = 0;

    books.forEach(book => {
        qrCount += (book.count || 0);
    });

    const numbers = document.querySelectorAll(".number");

    if (numbers.length >= 2) {
        numbers[0].textContent = booksCount;
        numbers[1].textContent = qrCount;
    }

});
</script>

<!-- ================= AUTH ================= -->
<script>
if(localStorage.getItem("logged") !== "true"){
    window.location.href = "login.html";
}
</script>

<!-- ================= LOGOUT ================= -->
<script>
function logout(){
    localStorage.removeItem("logged");
    window.location.href = "login.html";
}
</script>
