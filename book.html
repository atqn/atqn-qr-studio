<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الكتاب</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

<header class="topbar">

    <div class="brand">

        <img src="assets/atqn-logo.png" alt="ATQN">

        <h1>ATQN QR Studio</h1>

    </div>

    <nav>

        <a href="index.html">الرئيسة</a>

        <a href="create.html">إنشاء QR</a>

        <a href="library.html">مكتبة الكتب</a>

    </nav>

</header>

<div class="container">

    <div class="library-header">

        <h2 id="bookTitle">
            اسم الكتاب
        </h2>

        <p id="bookCount">
            عدد الأكواد: 0
        </p>

    </div>

<div class="library-toolbar">

    <button
        id="addQrBtn"
        class="add-book-btn">

        ➕ إضافة QR جديد

    </button>

    <a
        href="library.html"
        class="add-book-btn"
        style="
        text-decoration:none;
        display:inline-block;">

        ← الرجوع للمكتبة

    </a>

</div>

<div
    id="qrList"
    class="books-grid">

</div>

</div>

<div id="addQrModal" class="modal-overlay">

    <div class="modal-box">

        <div class="modal-icon">➕</div>

        <h3>إضافة QR جديد</h3>

        <input
            id="qrTitleInput"
            type="text"
            class="modal-input"
            placeholder="عنوان QR">

        <input
            id="qrLinkInput"
            type="text"
            class="modal-input"
            placeholder="الرابط أو المحتوى">

        <div class="modal-actions">

            <button
                id="saveQrBtn"
                class="modal-btn danger-btn">
                حفظ
            </button>

            <button
                id="cancelQrBtn"
                class="modal-btn cancel-btn">
                إلغاء
            </button>

        </div>

    </div>

</div>

<div id="deleteQrModal" class="modal-overlay">
    <div class="modal-box">
        <div class="modal-icon">⚠️</div>
        <h3>تأكيد الحذف</h3>
        <p>هل تريد حذف هذا الـ QR؟</p>

        <div class="modal-actions">
            <button id="confirmDeleteQrBtn" class="modal-btn danger-btn">حذف</button>
            <button id="cancelDeleteQrBtn" class="modal-btn cancel-btn">إلغاء</button>
        </div>
    </div>
</div>
    
<script src="book.js"></script>

</body>
</html>
