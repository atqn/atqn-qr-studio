<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>الكتاب</title>
<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
</head>

<body>

<header class="topbar">
    <div class="brand">
        <img src="assets/atqn-logo.png" alt="ATQN">
        <h1>ATQN QR Studio</h1>
    </div>

    <nav>
        <a href="index.html">الرئيسة</a>
        <a href="library.html">مكتبة الكتب</a>
        <a href="create.html">إنشاء QR</a>
        <a href="#" onclick="logout()">خروج</a>
    </nav>
</header>

<div class="container">

    <h1 id="bookTitle"></h1>
    <p id="bookCount"></p>

    <!-- BOOK ACTIONS -->
    <button id="deleteBookBtn" style="background:red;color:white;">
        🗑 حذف الكتاب
    </button>

    <hr>

    <!-- QR PANEL -->
    <input id="qrTitle" placeholder="عنوان QR">
    <input id="qrDesc" placeholder="وصف QR">
    <input id="qrLink" placeholder="الرابط">

    <input type="color" id="qrColor" value="#000000">

    <select id="qrSize">
        <option value="300">300</option>
        <option value="600">600</option>
        <option value="1200">1200</option>
        <option value="2400">2400</option>
    </select>

    <!-- LOGO OPTIONS -->
    <select id="logoType">
        <option value="default">شعار ATQN</option>
        <option value="upload">رفع من الجهاز</option>
    </select>

    <input type="file" id="logoUpload" style="display:none;">

    <button id="generateQR">توليد QR</button>
    <button id="saveQR">حفظ</button>

    <canvas id="qrCanvas"></canvas>

    <div id="qrList"></div>

</div>

<script type="module">
import { auth } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

onAuthStateChanged(auth, (user) => {
    if (!user) window.location.href = "login.html";
});
</script>

<script type="module" src="./book.js"></script>

<script type="module">
import { logout } from "./auth.js";
window.logout = logout;
</script>

</body>
</html>
