<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>ATQN QR Studio</title>
<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
</head>

<body>

<header class="topbar">
    <div class="brand">
        <img src="assets/atqn-logo.png">
        <h1>ATQN QR Studio</h1>
    </div>

    <nav>
        <a href="index.html">الرئيسية</a>
        <a href="library.html">المكتبة</a>
        <a href="create.html">إنشاء QR</a>
        <a href="#" onclick="logout()">خروج</a>
    </nav>
</header>

<div class="container">

    <h2 id="bookTitle"></h2>
    <p id="bookCount"></p>

    <div class="qr-panel">

        <input id="qrTitle" placeholder="عنوان QR">
        <input id="qrDesc" placeholder="وصف">
        <input id="qrLink" placeholder="الرابط">

        <input type="color" id="qrColor" value="#000000">

        <select id="qrSize">
            <option value="300">300</option>
            <option value="600">600</option>
            <option value="1200">1200</option>
            <option value="2400">2400</option>
        </select>

        <input type="file" id="logoUpload">

        <button id="generateQR">توليد QR</button>
        <button id="saveQR">حفظ</button>

    </div>

    <canvas id="qrCanvas"></canvas>

    <div id="qrList"></div>

</div>

<script type="module" src="./book.js"></script>

<script type="module">
import { auth } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

onAuthStateChanged(auth, (user) => {
    if (!user) location.href = "login.html";
});
</script>

<script type="module">
import { logout } from "./auth.js";
window.logout = logout;
</script>

</body>
</html>
