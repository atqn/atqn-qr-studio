<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>الكتاب</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
    <h1 id="bookTitle">📘 الكتاب</h1>
    <p id="bookCount">0 QR</p>
</header>

<div class="container">

    <button id="addQrBtn">➕ إضافة QR</button>

    <div id="qrList" class="books-grid"></div>

</div>

<!-- MODAL -->
<div id="qrModal" class="modal-overlay" style="display:none;">
    <div class="modal-box">

        <h3>إضافة QR</h3>

        <input id="qrTitle" placeholder="عنوان">
        <input id="qrDesc" placeholder="وصف">
        <input id="qrContent" placeholder="المحتوى / الرابط">

        <div class="modal-actions">
            <button id="saveQrBtn">حفظ</button>
            <button id="cancelQrBtn">إلغاء</button>
        </div>

    </div>
</div>

<script type="module" src="book.js"></script>
    
<script src="header.js"></script>
    
</body>
</html>
