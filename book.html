<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>الكتاب - ATQN</title>

<link rel="stylesheet" href="style.css">

<!-- QR STYLING ENGINE -->
<script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.6.0/lib/qr-code-styling.js"></script>
</head>

<body>

<header class="topbar">
    <div class="brand">
        <img src="assets/atqn-logo.png">
        <h1>ATQN QR Studio</h1>
    </div>

    <nav>
        <a href="index.html">الرئيسة</a>
        <a href="library.html">المكتبة</a>
        <a href="create.html">إنشاء QR</a>
        <a href="#" onclick="logout()">خروج</a>
    </nav>
</header>

<div class="container">

    <div class="library-header">
        <h2 id="bookTitle">الكتاب</h2>
        <p id="bookCount">0 QR</p>
    </div>

    <!-- QR Editor Panel -->
    <div class="qr-panel">

        <input id="qrTitle" placeholder="عنوان QR">
        <input id="qrDesc" placeholder="وصف QR">
        <input id="qrLink" placeholder="الرابط">

        <input type="color" id="qrColor" value="#000000">

        <select id="qrSize">
            <option value="300">300 DPI</option>
            <option value="600">600 DPI</option>
            <option value="1200">1200 DPI</option>
            <option value="2400">2400 DPI</option>
        </select>

        <select id="qrStyle">
            <option value="square">Square</option>
            <option value="dots">Dots</option>
            <option value="rounded">Rounded</option>
            <option value="extra-rounded">Extra Rounded</option>
        </select>

        <select id="logoMode">
            <option value="default">شعار ATQN</option>
            <option value="upload">رفع شعار</option>
        </select>

        <input type="file" id="logoUpload" style="display:none;">

        <button id="generateQR">⚡ توليد QR</button>
        <button id="saveQR">💾 حفظ</button>

    </div>

    <!-- Preview -->
    <div id="qrCanvas"></div>

    <!-- Actions -->
    <div class="qr-actions">
        <button id="downloadPNG">تحميل PNG</button>
        <button id="downloadSVG">تحميل SVG</button>
    </div>

    <hr>

    <!-- LIST -->
    <div id="qrList"></div>

</div>

<script type="module" src="./book.js"></script>

<script type="module">
import { auth } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

onAuthStateChanged(auth, (user) => {
    if (!user) location.href = "login.html";
});
</script>

<script type="module">
import { logout } from "./auth.js";
window.logout = logout;
</script>

</body>
</html>
